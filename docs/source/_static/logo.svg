<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Background with rounded corners and subtle border for both themes -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0"/>
      <stop offset="100%" style="stop-color:#00B4D8"/>
    </linearGradient>

    <linearGradient id="accentGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5A0"/>
      <stop offset="100%" style="stop-color:#00B4D8"/>
    </linearGradient>

    <radialGradient id="faceGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#1A2332"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="speedFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0"/>
      <stop offset="35%" style="stop-color:white;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:1"/>
    </linearGradient>

    <mask id="speedMask">
      <rect x="0" y="0" width="160" height="300" fill="url(#speedFade)"/>
    </mask>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0"/>
      <stop offset="50%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#00E5A0"/>
    </linearGradient>

    <!-- Text gradient for ZeroBench title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ECEFF4"/>
      <stop offset="100%" style="stop-color:#D8DEE9"/>
    </linearGradient>

    <!-- Separator line gradient -->
    <linearGradient id="sepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00E5A0;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#00B4D8;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#00E5A0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00B4D8;stop-opacity:0"/>
    </linearGradient>

    <!-- Outer border gradient for light-mode visibility -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.35"/>
      <stop offset="50%" style="stop-color:#00B4D8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0.35"/>
    </linearGradient>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="300" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Subtle grid -->
  <g opacity="0.025">
    <line x1="0" y1="75" x2="1200" y2="75" stroke="white" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="225" x2="1200" y2="225" stroke="white" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="300" stroke="white" stroke-width="1"/>
  </g>

  <!-- === SPEED LINES (far left) === -->
  <g mask="url(#speedMask)" opacity="0.85">
    <line x1="15" y1="90" x2="110" y2="90" stroke="#00E5A0" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="30" y1="103" x2="120" y2="103" stroke="#00B4D8" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <line x1="10" y1="116" x2="100" y2="116" stroke="#00E5A0" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

    <line x1="20" y1="142" x2="125" y2="142" stroke="#00B4D8" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
    <line x1="35" y1="155" x2="135" y2="155" stroke="#00E5A0" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="12" y1="168" x2="115" y2="168" stroke="#00B4D8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

    <line x1="25" y1="194" x2="118" y2="194" stroke="#00E5A0" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="40" y1="207" x2="130" y2="207" stroke="#00B4D8" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <line x1="18" y1="220" x2="105" y2="220" stroke="#00E5A0" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- === STOPWATCH (left area) === -->
  <g transform="translate(250, 150)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="108" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.25" filter="url(#glowStrong)"/>
    <!-- Bezel -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.75"/>
    <!-- Face -->
    <circle cx="0" cy="0" r="92" fill="url(#faceGrad)" stroke="#1E2A3A" stroke-width="1"/>

    <!-- Major ticks -->
    <g stroke="#00E5A0" stroke-width="2" opacity="0.65" stroke-linecap="round">
      <line x1="0" y1="-83" x2="0" y2="-73"/>
      <line x1="41.5" y1="-71.9" x2="36.5" y2="-63.2"/>
      <line x1="71.9" y1="-41.5" x2="63.2" y2="-36.5"/>
      <line x1="83" y1="0" x2="73" y2="0"/>
      <line x1="71.9" y1="41.5" x2="63.2" y2="36.5"/>
      <line x1="41.5" y1="71.9" x2="36.5" y2="63.2"/>
      <line x1="0" y1="83" x2="0" y2="73"/>
      <line x1="-41.5" y1="71.9" x2="-36.5" y2="63.2"/>
      <line x1="-71.9" y1="41.5" x2="-63.2" y2="36.5"/>
      <line x1="-83" y1="0" x2="-73" y2="0"/>
      <line x1="-71.9" y1="-41.5" x2="-63.2" y2="-36.5"/>
      <line x1="-41.5" y1="-71.9" x2="-36.5" y2="-63.2"/>
    </g>

    <!-- Minor ticks -->
    <g stroke="#2A3A4A" stroke-width="0.8" opacity="0.45" stroke-linecap="round">
      <line x1="21.5" y1="-80.2" x2="18.8" y2="-70.5"/>
      <line x1="58.7" y1="-58.7" x2="51.6" y2="-51.6"/>
      <line x1="80.2" y1="-21.5" x2="70.5" y2="-18.8"/>
      <line x1="80.2" y1="21.5" x2="70.5" y2="18.8"/>
      <line x1="58.7" y1="58.7" x2="51.6" y2="51.6"/>
      <line x1="21.5" y1="80.2" x2="18.8" y2="70.5"/>
      <line x1="-21.5" y1="80.2" x2="-18.8" y2="70.5"/>
      <line x1="-58.7" y1="58.7" x2="-51.6" y2="51.6"/>
      <line x1="-80.2" y1="21.5" x2="-70.5" y2="18.8"/>
      <line x1="-80.2" y1="-21.5" x2="-70.5" y2="-18.8"/>
      <line x1="-58.7" y1="-58.7" x2="-51.6" y2="-51.6"/>
      <line x1="-21.5" y1="-80.2" x2="-18.8" y2="-70.5"/>
    </g>

    <!-- Digital display -->
    <rect x="-26" y="16" width="52" height="22" rx="3" fill="none" stroke="#00E5A0" stroke-width="0.8" opacity="0.35"/>
    <text x="0" y="33" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00E5A0" opacity="0.75" font-weight="700">0.00</text>
    <text x="0" y="48" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#00B4D8" opacity="0.45" letter-spacing="1.5">ns</text>

    <!-- Needle -->
    <line x1="0" y1="0" x2="-56" y2="-56" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#00E5A0"/>
    <circle cx="0" cy="0" r="2.5" fill="#0D1117"/>

    <!-- Crown -->
    <rect x="-6" y="-116" width="12" height="18" rx="3" fill="#1E2A3A" stroke="url(#ringGrad)" stroke-width="1.2"/>

    <!-- Side button -->
    <rect x="88" y="-15" width="14" height="10" rx="2.5" fill="#1E2A3A" stroke="#00B4D8" stroke-width="0.8" opacity="0.55"/>

    <!-- Lightning watermark -->
    <g filter="url(#glowStrong)" opacity="0.12">
      <polygon points="-8,-38 6,-4 -2,-4 8,38 -6,4 2,4" fill="#00E5A0"/>
    </g>
  </g>

  <!-- === VERTICAL SEPARATOR === -->
  <line x1="430" y1="40" x2="430" y2="260" stroke="url(#sepGrad)" stroke-width="1.5"/>

  <!-- === RIGHT SIDE: TEXT === -->
  <g transform="translate(480, 0)">
    <!-- ZeroBench title -->
    <text x="0" y="128" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
      <tspan fill="#ECEFF4">Zero</tspan><tspan fill="url(#accentGradH)">Bench</tspan>
    </text>

    <!-- Decorative underline -->
    <rect x="2" y="142" width="380" height="2" rx="1" fill="url(#accentGradH)" opacity="0.25"/>

    <!-- Subtitle -->
    <text x="4" y="172" font-family="'SF Mono', 'Courier New', monospace" font-size="15.5" fill="#8B949E" letter-spacing="2.5" opacity="0.85">Multidimensional Benchmarking</text>

    <!-- Zero Overhead tag -->
    <g transform="translate(4, 186)">
      <rect x="0" y="0" width="152" height="22" rx="4" fill="none" stroke="#00E5A0" stroke-width="0.8" opacity="0.4"/>
      <text x="76" y="15" text-anchor="middle" font-family="'SF Mono', 'Courier New', monospace" font-size="11" fill="#00E5A0" letter-spacing="2" opacity="0.7">ZERO OVERHEAD</text>
    </g>

    <!-- Python badge -->
    <g transform="translate(168, 186)">
      <rect x="0" y="0" width="78" height="22" rx="4" fill="none" stroke="#00B4D8" stroke-width="0.8" opacity="0.35"/>
      <text x="39" y="15" text-anchor="middle" font-family="'SF Mono', 'Courier New', monospace" font-size="11" fill="#00B4D8" letter-spacing="1.5" opacity="0.6">PYTHON</text>
    </g>
  </g>

  <!-- === DECORATIVE SPEED LINES (right edge) === -->
  <g opacity="0.2">
    <line x1="1080" y1="65" x2="1160" y2="65" stroke="#00E5A0" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="1090" y1="78" x2="1170" y2="78" stroke="#00B4D8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="1075" y1="91" x2="1145" y2="91" stroke="#00E5A0" stroke-width="1" stroke-linecap="round"/>

    <line x1="1085" y1="222" x2="1165" y2="222" stroke="#00B4D8" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="1095" y1="235" x2="1175" y2="235" stroke="#00E5A0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="1080" y1="248" x2="1150" y2="248" stroke="#00B4D8" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
